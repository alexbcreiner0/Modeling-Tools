values:
  name: Values
  projection: 2d
  axis_visible: true
  grid_visible: true
  ticks_visible: true
  frame_visible: true
  plots:
    values:
      checkbox_name: Values
      linestyle: solid
      linewidth: 1.5
      markersize: 6.0
      labels: [Value of C1, Value of C2, Value of C3, Value of C4, Value of C5]
      colors: [red, blue, green, purple, '#ef73ff']
      traj_key: values
      traj_key_x: interval_t
      toggled: true
    estimated_vallues_indirect_calcs:
      checkbox_name: Estimated Vallues (+Indirect Calcs)
      linestyle: dotted
      linewidth: 1.5
      markersize: 6.0
      labels: [Estimated Value of C1 (With Indirect Calcs), Estimated Value of C2
          (With Indirect Calcs), Estimated Value of C3 (With Indirect Calcs), Estimated
          Value of C4 (With Indirect Calcs), Estimated Value of C5 (With Indirect
          Calcs)]
      colors: [red, blue, green, purple, '#ff55ff']
      traj_key: estimated_values_upd_indirect
      traj_key_x: ''
      toggled: true
    estimated_values_current_method:
      checkbox_name: Estimated Values (Current Method)
      linestyle: dashed
      linewidth: 1.5
      markersize: 6.0
      labels: [Estimated Value C1, Estimated Value C2, Estimated Value C3, Estimated
          Value C4, Estimated Value C5]
      colors: [red, blue, green, purple, '#ff55ff']
      traj_key: estimated_values_cur
      traj_key_x: ''
      toggled: true
    estimated_values_annual_recalc_indirect:
      checkbox_name: Estimated Values (Annual Recalc + Indirect
      linestyle: dotted
      linewidth: 1.5
      markersize: 6.0
      labels: [Estimated Value C1 (Upd Indirect + Annual Recalc), Estimated Value
          C2 (Upd Indirect + Annual Recalc), Estimated Value C3 (Upd Indirect + Annual
          Recalc), Estimated Value C4 (Upd Indirect + Annual Recalc), Estimated Value
          C5 (Upd Indirect + Annual Recalc)]
      colors: [red, blue, green, purple, '#ff55ff']
      traj_key: estimated_values_upd_indirect_w_annual_correction
      traj_key_x: ''
      toggled: false
living_labor_times:
  name: Living Labor Times
  plots:
    current_ll_update_schema:
      checkbox_name: Current LL Update Schema
      linestyle: dashed
      linewidth: 1.5
      markersize: 6.0
      labels: [Updated LL of C1, Updated LL of C2, Updated LL of C3, Updated LL of
          C4, Updated LL of C5]
      colors: [red, blue, green, purple, '#ef73ff']
      traj_key: updated_lls_cur
      traj_key_x: ''
      toggled: true
    actual_ll_times:
      checkbox_name: Actual LL Times
      linestyle: solid
      linewidth: 1.5
      markersize: 6.0
      labels: [LL of C1, LL of C2, LL of C3, LL of C4, LL of C5]
      colors: [red, blue, green, purple, '#ef73ff']
      traj_key: ll_times
      traj_key_x: interval_t
      toggled: true
    proposed_ll_update_schema:
      checkbox_name: Proposed LL Update Schema
      linestyle: dotted
      linewidth: 1.5
      markersize: 6.0
      labels: [Proposed LL for C1, Proposed LL for C2, Proposed LL for C3, Proposed
          LL for C4, Proposed LL for C5]
      colors: [red, blue, green, purple, '#ef73ff']
      traj_key: updated_lls_proposed
      traj_key_x: ''
      toggled: true
    order_volumes_per_period:
      checkbox_name: Order Volumes Per Period
      linestyle: dotted
      linewidth: 1.5
      markersize: 6.0
      labels: [Average Order Volume for C1, Average Order Volume for C2, Average Order
          Volume for C3, Average Order Volume for C4, Average Order Volume for C5]
      colors: [red, blue, green, purple, '#ef73ff']
      traj_key: avg_order_vol
      traj_key_x: interval_t
      toggled: false
    new_ll_proposal:
      checkbox_name: New LL Proposal
      linestyle: dotted
      linewidth: 1.5
      markersize: 6.0
      labels: [Updateder LL of C1, Updateder LL of C2, Updateder LL of C3, Updateder
          LL of C4, Updateder LL of C5]
      colors: [red, blue, green, purple, pink]
      traj_key: updated_lls_new_proposed
      traj_key_x: ''
      toggled: false
